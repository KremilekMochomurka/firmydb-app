<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Startup Tycoon CZ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#13131f;--card2:#1a1a2e;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#e17055;--yellow:#fdcb6e;--blue:#74b9ff;--text:#e0e0e0;--text2:#888;--border:#2a2a3e}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.hidden{display:none!important}
/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--accent)}50%{box-shadow:0 0 20px var(--accent),0 0 40px rgba(108,92,231,0.3)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.fade-in{animation:fadeIn .5s ease}
.slide-in{animation:slideIn .4s ease}
.pulse{animation:pulse .3s ease}
.shake{animation:shake .5s ease}

/* Title Screen */
#title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
#title-screen h1{font-size:4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem;animation:float 3s ease-in-out infinite}
#title-screen .subtitle{font-size:1.2rem;color:var(--text2);margin-bottom:3rem;font-style:italic}
.btn{padding:14px 36px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b7cf7);color:#fff;box-shadow:0 4px 15px rgba(108,92,231,.4)}
.btn-primary:hover{box-shadow:0 6px 25px rgba(108,92,231,.6)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-success{background:linear-gradient(135deg,var(--green),#55efc4);color:#000}
.btn-danger{background:linear-gradient(135deg,var(--red),#fab1a0);color:#000}
.btn-small{padding:8px 18px;font-size:.85rem;border-radius:8px}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:1rem}

/* Game Layout */
#game-screen{display:none;min-height:100vh}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.top-bar .company-name{font-size:1.1rem;font-weight:700;color:var(--accent2)}
.top-bar .turn-info{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--text2)}
.stats-bar{display:flex;gap:4px;flex-wrap:wrap}
.stat-chip{background:var(--card2);padding:6px 14px;border-radius:20px;font-size:.8rem;display:flex;align-items:center;gap:6px;border:1px solid var(--border);transition:all .3s}
.stat-chip .label{color:var(--text2)}
.stat-chip .value{font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-chip.money .value{color:var(--green)}
.stat-chip.rep .value{color:var(--yellow)}
.stat-chip.morale .value{color:var(--blue)}
.stat-chip.quality .value{color:var(--accent2)}
.stat-chip.stress .value{color:var(--red)}
.stat-change{font-size:.7rem;font-weight:600;margin-left:2px}
.stat-change.positive{color:var(--green)}
.stat-change.negative{color:var(--red)}

.main-content{max-width:900px;margin:0 auto;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;animation:fadeIn .4s ease}
.card h2{font-size:1.3rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3{font-size:1.1rem;margin-bottom:8px;color:var(--accent2)}
.card p{color:var(--text2);line-height:1.6;margin-bottom:12px}

/* Decision Cards */
.decisions{display:grid;gap:12px;margin-top:16px}
.decision-btn{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;text-align:left;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.decision-btn:hover{border-color:var(--accent);background:#1e1e35;transform:translateX(4px)}
.decision-btn:active{transform:translateX(2px)}
.decision-btn .title{font-weight:600;font-size:1rem;margin-bottom:4px}
.decision-btn .desc{font-size:.85rem;color:var(--text2)}
.decision-btn .effects{font-size:.75rem;margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
.decision-btn .effect-tag{padding:2px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.effect-tag.positive{background:rgba(0,184,148,.15);color:var(--green)}
.effect-tag.negative{background:rgba(225,112,85,.15);color:var(--red)}
.effect-tag.neutral{background:rgba(116,185,255,.15);color:var(--blue)}
.decision-btn.locked{opacity:.4;cursor:not-allowed}
.decision-btn.locked:hover{border-color:var(--border);background:var(--card2);transform:none}

/* Progress bars */
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-bar .fill{height:100%;border-radius:4px;transition:width .5s ease}
.fill-green{background:linear-gradient(90deg,var(--green),#55efc4)}
.fill-red{background:linear-gradient(90deg,var(--red),#fab1a0)}
.fill-blue{background:linear-gradient(90deg,var(--blue),#a29bfe)}
.fill-yellow{background:linear-gradient(90deg,var(--yellow),#ffeaa7)}
.fill-accent{background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);padding:4px;border-radius:12px;border:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:500;transition:all .2s;color:var(--text2)}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){background:var(--card2)}

/* Shop/Upgrade items */
.upgrade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.upgrade-item{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s}
.upgrade-item:hover{border-color:var(--accent)}
.upgrade-item .name{font-weight:600;margin-bottom:4px}
.upgrade-item .cost{font-family:'JetBrains Mono',monospace;color:var(--green);font-size:.9rem}
.upgrade-item .effect{font-size:.8rem;color:var(--text2);margin:8px 0}
.upgrade-item.owned{border-color:var(--green);opacity:.6}
.upgrade-item.owned::after{content:'✓ Vlastníš';position:absolute;top:8px;right:12px;font-size:.75rem;color:var(--green)}
.upgrade-item{position:relative}

/* Team */
.team-member{display:flex;align-items:center;gap:12px;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.team-member .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;background:var(--card)}
.team-member .info{flex:1}
.team-member .name{font-weight:600;font-size:.95rem}
.team-member .role{font-size:.8rem;color:var(--text2)}
.team-member .skill{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent2)}

/* Event overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);animation:fadeIn .3s ease}
.overlay-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:550px;width:90%;animation:fadeIn .4s ease}
.overlay-card h2{font-size:1.4rem;margin-bottom:16px}
.overlay-card p{margin-bottom:16px;line-height:1.7}
.overlay-card .emoji-big{font-size:3rem;margin-bottom:16px;display:block;text-align:center}

/* Notifications */
.notif{position:fixed;top:80px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;z-index:300;animation:slideIn .3s ease;max-width:350px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.notif.success{border-color:var(--green)}
.notif.danger{border-color:var(--red)}
.notif.info{border-color:var(--blue)}

/* Leaderboard */
.lb-entry{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid var(--border)}
.lb-entry .rank{font-size:1.5rem;font-weight:800;width:40px;text-align:center}
.lb-entry .rank.gold{color:var(--yellow)}
.lb-entry .rank.silver{color:#ccc}
.lb-entry .rank.bronze{color:#cd7f32}
.lb-entry .details{flex:1}
.lb-entry .score{font-family:'JetBrains Mono',monospace;color:var(--green);font-weight:700}

/* End screen */
#end-screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}
#end-screen h1{font-size:3rem;margin-bottom:1rem}
#end-screen .final-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;max-width:600px;margin:2rem auto}
.final-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.final-stat .label{font-size:.8rem;color:var(--text2);margin-bottom:4px}
.final-stat .value{font-size:1.8rem;font-weight:800;font-family:'JetBrains Mono',monospace}

/* Confetti */
.confetti-piece{position:fixed;width:10px;height:10px;top:-10px;z-index:400;animation:confetti 3s ease-in forwards}

/* Responsive */
@media(max-width:768px){
  #title-screen h1{font-size:2.5rem}
  .stats-bar{gap:2px}
  .stat-chip{padding:4px 8px;font-size:.7rem}
  .top-bar{flex-direction:column;gap:8px}
  .main-content{padding:12px}
}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}

/* Tooltip */
.tooltip{position:relative}
.tooltip:hover::after{content:attr(data-tip);position:absolute;bottom:120%;left:50%;transform:translateX(-50%);background:var(--card2);color:var(--text);padding:6px 12px;border-radius:8px;font-size:.75rem;white-space:nowrap;z-index:50;border:1px solid var(--border)}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <h1>🚀 Startup Tycoon</h1>
  <p class="subtitle">„Protože každej v Praze dělá startup, ale nikdo nedělá revenue."</p>
  <div style="margin-bottom:2rem">
    <div class="btn-group">
      <button class="btn btn-primary" onclick="startNewGame()">🎮 Nová Hra</button>
      <button class="btn btn-secondary" onclick="showLeaderboard()">🏆 Leaderboard</button>
    </div>
  </div>
  <div id="title-leaderboard" class="card hidden" style="max-width:500px;width:100%">
    <h2>🏆 Hall of Fame</h2>
    <div id="lb-list"></div>
    <div class="btn-group"><button class="btn btn-secondary btn-small" onclick="document.getElementById('title-leaderboard').classList.add('hidden')">Zavřít</button></div>
  </div>
  <p style="color:var(--text2);font-size:.8rem;margin-top:3rem">v1.0 • Made with ☕ a sarkasmus</p>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="top-bar">
    <div>
      <div class="company-name" id="company-name">TechCorp s.r.o.</div>
      <div class="turn-info" id="turn-info">Měsíc 1 • Leden 2025 • Věk 20</div>

    <div class="stats-bar" id="stats-bar"></div>
    <div>
      <button class="btn btn-secondary btn-small" onclick="showMenu()">☰</button>
    </div>
  </div>
  <div class="main-content" id="main-content"></div>
</div>

<!-- END SCREEN -->
<div id="end-screen">
  <div id="end-content"></div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden" onclick="event.target===this&&closeOverlay()">
  <div class="overlay-card" id="overlay-content"></div>
</div>

<!-- NOTIFICATION -->
<div id="notif" class="notif hidden"></div>

// === GAME ENGINE ===

function startNewGame() {
  G = DEFAULT_STATE();
  showNameInput();
}

function showNameInput() {
  const el = document.getElementById('overlay-content');
  el.innerHTML = `
    <span class="emoji-big">🚀</span>
    <h2>Založit startup</h2>
    <p>Jsi 20letý hustler z Česka. Máš 500k CZK, ambice na miliardovou firmu, a zero chill. Pojďme na to.</p>
    <div style="margin:16px 0">
      <label style="display:block;margin-bottom:8px;color:var(--text2);font-size:.9rem">Název firmy:</label>
      <input id="input-name" type="text" placeholder="např. NovaTech" style="width:100%;padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;font-family:inherit" autofocus>
    </div>
    <div style="margin:16px 0">
      <label style="display:block;margin-bottom:8px;color:var(--text2);font-size:.9rem">Název produktu:</label>
      <input id="input-product" type="text" placeholder="např. FlowAI" style="width:100%;padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;font-family:inherit">
    </div>
    <div style="margin:16px 0">
      <label style="display:block;margin-bottom:12px;color:var(--text2);font-size:.9rem">Sektor:</label>
      <div style="display:grid;gap:8px">
        ${SECTORS.map(s=>`
          <label class="decision-btn" style="display:flex;align-items:center;gap:12px;cursor:pointer">
            <input type="radio" name="sector" value="${s.id}" style="display:none" onchange="this.closest('.decision-btn').style.borderColor='var(--accent)'">
            <span style="font-size:1.5rem">${s.icon}</span>
            <div>
              <div class="title">${s.name}</div>
              <div class="desc">${s.desc}</div>
            </div>
          </label>
        `).join('')}
      </div>
    </div>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="confirmNewGame()">Založit firmu! 🚀</button>
    </div>
  `;
  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('input-name')?.focus(),100);
}

function confirmNewGame() {
  const name = document.getElementById('input-name').value.trim() || 'TechCorp';
  const product = document.getElementById('input-product').value.trim() || 'SuperApp';
  const sectorEl = document.querySelector('input[name="sector"]:checked');
  const sector = sectorEl ? sectorEl.value : 'saas';

  G.companyName = name;
  G.productName = product;
  G.sector = sector;

  const s = SECTORS.find(x=>x.id===sector);
  G.quality += s.qualityBonus;

  closeOverlay();
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';

  // Queue opening decisions
  G.pendingDecision = DECISIONS.opening[0];
  renderGame();
  showDecision(G.pendingDecision);
}

function renderGame() {
  updateTopBar();
  renderMainContent();
}

function updateTopBar() {
  const year = 2025 + Math.floor((G.month-1)/12);
  const monthName = MONTHS[(G.month-1)%12];
  const age = 20 + Math.floor((G.month-1)/12);

  document.getElementById('company-name').textContent = `${G.companyName} s.r.o.`;
  document.getElementById('turn-info').textContent = `Měsíc ${G.month} • ${monthName} ${year} • Věk ${age}`;

  const statsBar = document.getElementById('stats-bar');
  statsBar.innerHTML = `
    <div class="stat-chip money tooltip" data-tip="Hotovost"><span class="label">💰</span><span class="value">${formatMoney(G.money)}</span></div>
    <div class="stat-chip rep tooltip" data-tip="Reputace"><span class="label">⭐</span><span class="value">${G.reputation}</span></div>
    <div class="stat-chip morale tooltip" data-tip="Morálka týmu"><span class="label">😊</span><span class="value">${G.morale}</span></div>
    <div class="stat-chip quality tooltip" data-tip="Kvalita produktu"><span class="label">🔧</span><span class="value">${G.quality}</span></div>
    <div class="stat-chip stress tooltip" data-tip="Stress level"><span class="label">😰</span><span class="value">${G.stress}</span></div>
    ${G.revenue>0?`<div class="stat-chip tooltip" data-tip="Měsíční revenue"><span class="label">📈</span><span class="value" style="color:var(--green)">+${formatMoney(G.revenue)}/m</span></div>`:''}
  `;
}

function renderMainContent() {
  const mc = document.getElementById('main-content');

  // Tabs
  const tabs = ['main','team','upgrades','stats'];
  const tabNames = ['📋 Hlavní','👥 Tým','🔧 Upgrady','📊 Statistiky'];

  mc.innerHTML = `
    <div class="tabs">
      ${tabs.map((t,i)=>`<div class="tab ${G.currentTab===t?'active':''}" onclick="switchTab('${t}')">${tabNames[i]}</div>`).join('')}
    </div>
    <div id="tab-content"></div>
  `;

  renderTab();
}

function switchTab(t) {
  G.currentTab = t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.tab:nth-child(${['main','team','upgrades','stats'].indexOf(t)+1})`)?.classList.add('active');
  renderTab();
}

function renderTab() {
  const tc = document.getElementById('tab-content');
  if (!tc) return;

  switch(G.currentTab) {
    case 'main': renderMainTab(tc); break;
    case 'team': renderTeamTab(tc); break;
    case 'upgrades': renderUpgradesTab(tc); break;
    case 'stats': renderStatsTab(tc); break;
  }
}

function renderMainTab(tc) {
  const stageNames = {idea:'💡 Idea Stage',mvp:'🔨 MVP Stage',growth:'📈 Growth Stage',scale:'🚀 Scale Stage'};
  const stageProgress = getStageProgress();
  const burnRate = calculateBurn();
  const monthlyNet = G.revenue - burnRate;
  const runway = monthlyNet >= 0 ? '∞' : Math.floor(G.money / Math.abs(monthlyNet));

  tc.innerHTML = `
    <div class="card">
      <h2>${stageNames[G.stage] || G.stage}</h2>
      <div class="progress-bar"><div class="fill fill-accent" style="width:${stageProgress}%"></div></div>
      <p style="font-size:.85rem;margin-top:4px">Progress: ${stageProgress}% do dalšího stage</p>
    </div>

    <div class="card">
      <h3>📊 Měsíční přehled</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:.9rem">
        <div>Revenue: <strong style="color:var(--green)">${formatMoney(G.revenue)}</strong></div>
        <div>Burn rate: <strong style="color:var(--red)">${formatMoney(burnRate)}</strong></div>

// === GAME ACTIONS ===

function advanceMonth() {
  G.month++;
  const burnRate = calculateBurn();

  // Apply monthly changes
  G.money += G.revenue - burnRate;
  G.money = Math.round(G.money);

  // Organic growth
  const marketingPower = MARKETING_LEVELS[G.marketingLevel]?.effect || 0;
  const userGrowth = Math.floor((G.reputation + marketingPower + G.quality) * (0.5 + Math.random()) * (G.model==='b2c'?3:0.5));
  const customerGrowth = Math.floor((G.reputation + marketingPower * 0.5) * 0.1 * (G.model==='b2b'?2:0.3) * (0.5+Math.random()));
  G.users += userGrowth;
  G.customers += customerGrowth;

  // Revenue growth from users/customers
  if (G.model === 'b2c') G.revenue += Math.floor(userGrowth * 2 * G.revenueMultiplier);
  if (G.model === 'b2b' || G.model === 'b2b2c') G.revenue += Math.floor(customerGrowth * 500 * G.revenueMultiplier);

  // Market fit grows with quality and users
  G.marketFit = Math.min(100, G.marketFit + Math.floor((G.quality * 0.1 + G.users * 0.001) * Math.random()));

  // Stress natural recovery/growth
  if (G.gymStreak > 0) G.stress = Math.max(0, G.stress - 3);
  if (G.mentorUnlocked) G.stress = Math.max(0, G.stress - 2);
  G.stress = Math.max(0, G.stress - G.stressReduction);

  // Morale drift
  if (G.money < 0) G.morale -= 10;
  if (G.stress > 80) G.morale -= 5;
  if (G.stress < 30 && G.money > 0) G.morale += 2;

  // Coffee addiction
  if (G.coffeeAddiction > 0) { G.stress += 2; G.morale += 1; }

  // Stage progression
  progressStage();

  // Clamp values
  clampStats();

  // Check for random event
  const event = rollEvent();
  if (event) {
    applyEvent(event);
    G.monthLog.push(`[M${G.month}] ${event.title}`);
  }

  // Check for decision trigger (every 3-4 months)
  if (G.month % 3 === 0 || (G.month % 2 === 0 && Math.random() > 0.5)) {
    const decision = getNextDecision();
    if (decision) {
      G.pendingDecision = decision;
    }
  }

  // Check game over conditions
  if (G.money < -500000) {
    endGame('bankrupt');
    return;
  }
  if (G.stress >= 100) {
    endGame('burnout');
    return;
  }
  if (G.morale <= 0 && G.team.length > 3) {
    endGame('mutiny');
    return;
  }
  if (G.month >= 120) { // 10 years
    endGame('timeout');
    return;
  }

  renderGame();

  // Show pending decision if any
  if (G.pendingDecision) {
    setTimeout(()=>showDecision(G.pendingDecision), 300);
  } else if (event) {
    // Event was already shown
  }

  // Log
  G.monthLog.push(`[M${G.month}] Revenue: ${formatMoney(G.revenue)} | Burn: ${formatMoney(burnRate)} | Net: ${formatMoney(G.revenue-burnRate)}`);
}

function progressStage() {
  const progress = getStageProgress();
  if (progress >= 100) {
    const stages = ['idea','mvp','growth','scale'];
    const idx = stages.indexOf(G.stage);
    if (idx < stages.length - 1) {
      G.stage = stages[idx+1];
      G.monthLog.push(`🎉 [M${G.month}] Postup do ${G.stage} stage!`);
      notify(`🎉 Level up! Jsi v ${G.stage} stage!`, 'success');
    }
  }
}

function getStageProgress() {
  switch(G.stage) {
    case 'idea':
      return Math.min(100, Math.floor(
        (G.quality / 50 * 30) +
        (G.team.length / 3 * 20) +
        ((G.model ? 25 : 0)) +
        (G.month >= 3 ? 25 : G.month * 8)
      ));
    case 'mvp':
      return Math.min(100, Math.floor(
        (G.users / 1000 * 25) +
        (G.customers / 20 * 25) +
        (G.revenue / 50000 * 25) +
        (G.marketFit / 50 * 25)
      ));
    case 'growth':
      return Math.min(100, Math.floor(
        (G.users / 50000 * 20) +
        (G.customers / 200 * 20) +
        (G.revenue / 500000 * 25) +
        (G.reputation / 80 * 15) +
        (G.team.length / 20 * 20)
      ));
    case 'scale':
      return Math.min(100, Math.floor(
        (G.revenue / 5000000 * 30) +
        (G.reputation / 100 * 20) +
        (G.users / 500000 * 20) +
        (G.team.length / 50 * 15) +
        (G.marketFit / 100 * 15)
      ));
    default: return 0;
  }
}

function calculateBurn() {
  let burn = G.monthlyBurn;
  const office = OFFICES.find(o=>o.id===G.office);
  burn += office?.burn || 0;
  G.team.forEach(m => burn += m.cost);
  if (G.mentorUnlocked) burn += 10000;
  if (G.coffeeAddiction > 0) burn += 2000;
  if (G.gymStreak > 0) burn += 2000;
  burn *= G.burnMultiplier;
  return Math.round(burn);
}

function estimateValuation() {
  let val = G.money;
  val += G.revenue * 60; // 5x annual revenue
  val += G.users * 100;
  val += G.customers * 5000;
  val += G.reputation * 10000;
  val += G.quality * 5000;
  val += G.marketFit * 20000;
  val += G.team.length * 50000;
  if (G.globalExpansion) val *= 2;
  return Math.max(0, Math.round(val));
}

// === EVENTS ===

function rollEvent() {
  const eligible = EVENTS.filter(e => e.minMonth <= G.month && Math.random() < e.chance);
  if (eligible.length === 0) return null;
  return eligible[Math.floor(Math.random() * eligible.length)];
}

function applyEvent(event) {
  const eff = event.effects;
  if (eff.money) G.money += eff.money;
  if (eff.reputation) G.reputation += eff.reputation;
  if (eff.morale) G.morale += eff.morale;
  if (eff.quality) G.quality += eff.quality;
  if (eff.stress) G.stress += eff.stress;
  if (eff.users) G.users = Math.max(0, G.users + eff.users);
  if (eff.customers) G.customers = Math.max(0, G.customers + eff.customers);
  if (eff.revenue) G.revenue = Math.max(0, G.revenue + eff.revenue);
  if (eff.investorRelations) G.investorRelations += eff.investorRelations;
  if (eff.networkingLevel) G.networkingLevel += eff.networkingLevel;

  if (event.easterEgg && !G.easterEggsFound.includes(event.easterEgg)) {
    G.easterEggsFound.push(event.easterEgg);
    notify(`🥚 Easter egg nalezen: ${event.easterEgg}!`, 'info');
  }

  // Show event overlay
  const typeColors = {positive:'var(--green)',negative:'var(--red)',neutral:'var(--blue)'};
  const el = document.getElementById('overlay-content');
  el.innerHTML = `
    <span class="emoji-big">${event.title.match(/[\p{Emoji}]/gu)?.[0] || '📰'}</span>
    <h2 style="color:${typeColors[event.type]}">${event.title}</h2>
    <p>${event.text}</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin:12px 0">
      ${Object.entries(eff).filter(([k,v])=>typeof v==='number'&&v!==0).map(([k,v])=>`
        <span class="effect-tag ${v>0?'positive':'negative'}">${k}: ${v>0?'+':''}${typeof v==='number'&&Math.abs(v)>999?formatMoney(v):v}</span>
      `).join('')}
    </div>
    <div class="btn-group"><button class="btn btn-primary" onclick="closeOverlay()">OK, jdeme dál</button></div>
  `;
  document.getElementById('overlay').classList.remove('hidden');
}

// === DECISIONS ===

function getNextDecision() {
  const pool = DECISIONS[G.stage];
  if (!pool) return null;
  const unused = pool.filter(d => !G.decisions.includes(d.title));
  if (unused.length === 0) return null;
  return unused[Math.floor(Math.random() * unused.length)];
}

function showDecision(decision) {
  const el = document.getElementById('overlay-content');
  el.innerHTML = `
    <h2>${decision.title}</h2>
    <p>${decision.text}</p>
    <div class="decisions">
      ${decision.options.map((opt,i)=>`
        <div class="decision-btn" onclick="makeDecision(${i})">
          <div class="title">${opt.text}</div>
          <div class="desc">${opt.desc}</div>
          <div class="effects">
            ${(opt.tags||[]).map(t=>`<span class="effect-tag neutral">${t}</span>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('overlay').classList.remove('hidden');
}

function makeDecision(idx) {
  const decision = G.pendingDecision;
  if (!decision) return;

  const opt = decision.options[idx];
  const eff = opt.effects;

  // Apply effects
  if (eff.money) G.money += eff.money;
  if (eff.reputation) G.reputation += eff.reputation;
  if (eff.morale) G.morale += eff.morale;
  if (eff.quality) G.quality += eff.quality;
  if (eff.stress) G.stress += eff.stress;
  if (eff.users) G.users = Math.max(0, G.users + eff.users);
  if (eff.customers) G.customers = Math.max(0, G.customers + eff.customers);
  if (eff.revenue) G.revenue = Math.max(0, G.revenue + eff.revenue);
  if (eff.investorRelations) G.investorRelations += eff.investorRelations;
  if (eff.funding) G.funding = eff.funding;
  if (eff.model) G.model = eff.model;
  if (eff.vcDilution) G.vcDilution += eff.vcDilution;
  if (eff.marketFit) G.marketFit += eff.marketFit;
  if (eff.pivots) G.pivots += eff.pivots;
  if (eff.dealsWon) G.dealsWon += eff.dealsWon;
  if (eff.dealsFailed) G.dealsFailed += eff.dealsFailed;
  if (eff.stage_progress) G.quality += Math.floor(eff.stage_progress * 0.3);

  // Exit handling
  if (eff.exitType === 'acquisition') {
    G.exitType = 'acquisition';
    G.exitValue = eff.exitValue;
    endGame('acquisition');
    closeOverlay();
    return;
  }

  if (eff.money && eff.money > 1000000) G.totalRaised += eff.money;

  G.decisions.push(decision.title);
  G.pendingDecision = null;
  G.monthLog.push(`[M${G.month}] Rozhodnutí: ${opt.text}`);

  clampStats();
  closeOverlay();
  renderGame();
}

// === HIRING ===

function getAvailableHires() {
  return ROLES.map(r => ({
    ...r,
    skill: 30 + Math.floor(Math.random() * 50)
  }));
}

function hirePerson(roleId) {
  const role = ROLES.find(r=>r.id===roleId);
  if (!role) return;
  const capacity = OFFICES.find(o=>o.id===G.office)?.capacity || 2;
  if (G.team.length >= capacity) { notify('Kancelář je plná!','danger'); return; }

  const isFemale = Math.random() > 0.5;
  const firstName = isFemale ? NAMES_F[Math.floor(Math.random()*NAMES_F.length)] : NAMES_M[Math.floor(Math.random()*NAMES_M.length)];
  const surname = SURNAMES[Math.floor(Math.random()*SURNAMES.length)];

  const member = {
    name: `${firstName} ${surname}`,
    role: role.role,
    icon: role.icon,
    cost: role.cost,
    quality: role.quality,
    morale: role.morale,
    skill: 30 + Math.floor(Math.random() * 50),
    skills: role.skills
  };

  G.team.push(member);
  G.quality += role.quality;
  G.morale += role.morale;
  G.monthLog.push(`[M${G.month}] Najat/a: ${member.name} (${role.role})`);
  notify(`${member.name} se připojil/a jako ${role.role}!`, 'success');
  clampStats();
  renderTab();
}

function firePerson(idx) {
  const member = G.team[idx];
  if (!member) return;
  G.quality -= member.quality;
  G.morale -= 10; // Firing hurts morale
  G.team.splice(idx, 1);
  G.monthLog.push(`[M${G.month}] Propuštěn/a: ${member.name}`);
  notify(`${member.name} odchází. Morale -10.`, 'danger');
  clampStats();
  renderTab();
}

// === UPGRADES ===

function upgradeOffice(id) {
  const office = OFFICES.find(o=>o.id===id);
  if (!office) return;
  if (G.money < office.cost) { notify('Nemáš dost peněz!','danger'); return; }
  G.money -= office.cost;
  G.office = id;
  G.morale += office.morale;
  G.reputation += office.rep;
  G.monthLog.push(`[M${G.month}] Upgrade kanceláře: ${office.name}`);
  notify(`🏢 Nová kancelář: ${office.name}!`, 'success');
  clampStats();
  renderTab();
}

function upgradeTech(id) {
  const tech = TECH_STACKS.find(t=>t.id===id);
  if (!tech) return;
  if (G.money < tech.cost) { notify('Nemáš dost peněz!','danger'); return; }
  G.money -= tech.cost;
  G.techStack = id;
  G.quality += tech.quality;
  G.monthLog.push(`[M${G.month}] Tech upgrade: ${tech.name}`);
  notify(`💻 Tech stack: ${tech.name}!`, 'success');
  clampStats();
  renderTab();
}

function upgradeMarketing() {
  const next = MARKETING_LEVELS[G.marketingLevel+1];
  if (!next) return;
  if (G.money < next.cost) { notify('Nemáš dost peněz!','danger'); return; }
  G.money -= next.cost;
  G.marketingLevel++;
  G.monthLog.push(`[M${G.month}] Marketing upgrade: ${next.name}`);
  notify(`📢 Marketing: ${next.name}!`, 'success');
  renderTab();
}

function personalUpgrade(type) {
  switch(type) {
    case 'gym':
      if (G.gymStreak > 0) { notify('Už chodíš do gymu!','info'); return; }
      G.gymStreak = 1;
      G.stress = Math.max(0, G.stress - 10);
      G.morale += 5;
      notify('💪 Gym membership activated! Stress -5/měs.','success');
      break;
    case 'mentor':
      if (G.mentorUnlocked) { notify('Už máš mentora!','info'); return; }
      G.mentorUnlocked = true;
      G.investorRelations += 15;
      G.networkingLevel += 10;
      notify('🧑‍🏫 Mentor unlocked! Lepší decision making.','success');
      break;
    case 'book': {
      if (G.money < 500) { notify('Nemáš ani na knihu? Oof.','danger'); return; }
      G.money -= 500;
      const books = [
        {name:'Die with Zero',effect:()=>{G.morale+=10;G.stress-=10},desc:'Morale +10, Stress -10',egg:'diewithzero'},
        {name:'12 Rules for Life',effect:()=>{G.quality+=10;G.morale+=5},desc:'Quality +10, Morale +5',egg:'12rules'},
        {name:'Zero to One',effect:()=>{G.quality+=15;G.reputation+=5},desc:'Quality +15, Rep +5',egg:'zerotoone'},
        {name:'The Lean Startup',effect:()=>{G.marketFit+=10;G.quality+=5},desc:'Market Fit +10, Quality +5',egg:'lean'},
        {name:'Atomic Habits',effect:()=>{G.stress-=15;G.morale+=10},desc:'Stress -15, Morale +10',egg:'atomichabits'},
        {name:'Thinking, Fast and Slow',effect:()=>{G.quality+=10;G.investorRelations+=10},desc:'Quality +10, IR +10',egg:'kahneman'},
        {name:'$100M Offers',effect:()=>{G.revenue+=20000;G.reputation+=10},desc:'Revenue +20k, Rep +10',egg:'hormozi'},
        {name:'The Hard Thing About Hard Things',effect:()=>{G.stress-=10;G.quality+=10;G.morale+=5},desc:'Stress -10, Quality +10',egg:'horowitz'},
        {name:'Never Split the Difference',effect:()=>{G.revenue+=15000;G.dealsWon+=1},desc:'Revenue +15k, Negotiation skills',egg:'negotiate'},
        {name:'Shoe Dog (Phil Knight)',effect:()=>{G.morale+=15;G.reputation+=5},desc:'Morale +15, Inspirace',egg:'shoedog'}
      ];
      const unread = books.filter(b=>!G.booksRead.includes(b.name));
      if (unread.length === 0) { notify('Už jsi přečetl všechny knihy! 📚','info'); G.money += 500; return; }
      const book = unread[Math.floor(Math.random()*unread.length)];
      book.effect();
      G.booksRead.push(book.name);
      if (book.egg && !G.easterEggsFound.includes(book.egg)) {
        G.easterEggsFound.push(book.egg);
      }
      notify(`📖 Přečetl jsi "${book.name}" — ${book.desc}`, 'success');
      break;
    }
    case 'coffee':
      if (G.coffeeAddiction > 0) { notify('Už jsi závislej na kafi!','info'); return; }
      if (G.money < 15000) { notify('Nemáš na espresso machine!','danger'); return; }
      G.money -= 15000;
      G.coffeeAddiction = 1;
      G.morale += 5;
      notify('☕ Premium kafe setup! Morale +5, Stress +2/měs.','success');
      break;
  }
  if (G.gymStreak > 0) G.gymStreak++;
  clampStats();
  renderTab();
}

// === MENU ===

function showMenu() {
  const el = document.getElementById('overlay-content');
  el.innerHTML = `
    <h2>☰ Menu</h2>
    <div class="decisions">
      <div class="decision-btn" onclick="closeOverlay()"><div class="title">▶️ Pokračovat ve hře</div></div>
      <div class="decision-btn" onclick="if(confirm('Opravdu chceš ukončit hru?')){saveToLeaderboard();location.reload()}"><div class="title">🏠 Hlavní menu</div></div>
      <div class="decision-btn" onclick="closeOverlay();showCheatSheet()"><div class="title">📖 Nápověda</div></div>
    </div>
  `;
  document.getElementById('overlay').classList.remove('hidden');
}

function showCheatSheet() {
  const el = document.getElementById('overlay-content');
  el.innerHTML = `
    <h2>📖 Jak hrát</h2>
    <p><strong>Cíl:</strong> Vybuduj startup z garáže na unicorn (nebo se prodej, nebo jdi na IPO).</p>
    <p><strong>Měsíce:</strong> Každé kliknutí na "Další měsíc" posune čas. Sleduj cash flow!</p>
    <p><strong>Staty:</strong></p>
    <ul style="margin:8px 0 8px 20px;color:var(--text2);font-size:.9rem">
      <li>💰 <strong>Peníze</strong> — klesnou pod -500k = bankrot</li>
      <li>⭐ <strong>Reputace</strong> — ovlivňuje růst a investory</li>
      <li>😊 <strong>Morálka</strong> — klesne na 0 = tým odejde</li>
      <li>🔧 <strong>Kvalita</strong> — lepší produkt = víc users</li>
      <li>😰 <strong>Stress</strong> — dosáhne 100 = burnout game over</li>
    </ul>
    <p><strong>Tipy:</strong></p>
    <ul style="margin:8px 0 8px 20px;color:var(--text2);font-size:.9rem">
      <li>Čti knihy — dávají permanent bonusy a easter eggs</li>
      <li>Gym snižuje stress každý měsíc</li>
      <li>Neběž moc rychle — burnout je reálný</li>
      <li>Sleduj runway — kolik měsíců přežiješ bez revenue</li>
    </ul>
    <div class="btn-group"><button class="btn btn-primary" onclick="closeOverlay()">Jasný, jdeme!</button></div>
  `;

// === END GAME ===

function endGame(reason) {
  const valuation = estimateValuation();
  const equity = 100 - G.vcDilution;
  const yourValue = Math.round(valuation * equity / 100);

  let title, desc, emoji;
  switch(reason) {
    case 'bankrupt':
      title = 'Bankrot! 💸';
      desc = 'Peníze došly. Jako většině startupů. Aspoň máš experience a LinkedIn connections.';
      emoji = '💀';
      break;
    case 'burnout':
      title = 'Burnout! 😵';
      desc = 'Stress level 100. Tělo řeklo dost. Možná si měl číst víc Peterson a chodit do gymu.';
      emoji = '🔥';
      break;
    case 'mutiny':
      title = 'Tým odešel! 👋';
      desc = 'Morálka na nule. Celý tým dal výpověď najednou. Asi jsi nebyl nejlepší šéf.';
      emoji = '😤';
      break;
    case 'acquisition':
      title = 'Akvizice! 🎉';
      desc = `${G.companyName} koupili za ${formatMoney(G.exitValue)}! Tvůj podíl: ${formatMoney(Math.round(G.exitValue*equity/100))}. Die with zero? Spíš die with millions.`;
      emoji = '💰';
      break;
    case 'timeout':
      title = 'Čas vypršel! ⏰';
      desc = '10 let je za námi. Čas zhodnotit, co jsi vybudoval.';
      emoji = '🕰️';
      break;
    case 'ipo':
      title = 'IPO! 🔔';
      desc = `${G.companyName} jde na burzu! Valuace: ${formatMoney(valuation)}. Tvůj podíl: ${formatMoney(yourValue)}.`;
      emoji = '🏛️';
      break;
    case 'unicorn':
      title = 'UNICORN! 🦄';
      desc = `${G.companyName} dosáhlo valuace přes 1 miliardu! Gratulace, jsi v klubu!`;
      emoji = '🦄';
      break;
    default:
      title = 'Konec hry';
      desc = 'Díky za hraní!';
      emoji = '🎮';
  }

  // Calculate score
  G.score = Math.round(
    (G.money > 0 ? G.money / 1000 : 0) +
    valuation / 500 +
    G.reputation * 100 +
    G.users * 0.5 +
    G.customers * 10 +
    G.booksRead.length * 500 +
    G.easterEggsFound.length * 1000 +
    G.dealsWon * 2000 +
    G.team.length * 500 +
    (reason === 'acquisition' ? G.exitValue / 100 : 0) +
    (reason === 'unicorn' ? 50000 : 0)
  );

  saveToLeaderboard();

  // Show end screen
  document.getElementById('game-screen').style.display = 'none';
  const es = document.getElementById('end-screen');
  es.style.display = 'flex';

  if (reason === 'acquisition' || reason === 'unicorn' || reason === 'ipo') {
    spawnConfetti();
  }

  document.getElementById('end-content').innerHTML = `
    <div style="font-size:5rem;margin-bottom:1rem">${emoji}</div>
    <h1 style="background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">${title}</h1>
    <p style="font-size:1.1rem;color:var(--text2);max-width:500px;margin:1rem auto">${desc}</p>

    <div class="final-stats">
      <div class="final-stat"><div class="label">Score</div><div class="value" style="color:var(--accent2)">${formatNum(G.score)}</div></div>
      <div class="final-stat"><div class="label">Valuace</div><div class="value" style="color:var(--green)">${formatMoney(valuation)}</div></div>
      <div class="final-stat"><div class="label">Tvůj podíl</div><div class="value">${equity}%</div></div>
      <div class="final-stat"><div class="label">Měsíce</div><div class="value">${G.month}</div></div>
      <div class="final-stat"><div class="label">Tým</div><div class="value">${G.team.length}</div></div>
      <div class="final-stat"><div class="label">Users</div><div class="value">${formatNum(G.users)}</div></div>
      <div class="final-stat"><div class="label">Revenue</div><div class="value" style="color:var(--green)">${formatMoney(G.revenue)}/m</div></div>
      <div class="final-stat"><div class="label">Easter Eggs</div><div class="value">${G.easterEggsFound.length}/11</div></div>
    </div>

    <div class="btn-group" style="margin-top:2rem">
      <button class="btn btn-primary" onclick="location.reload()">🔄 Hrát znovu</button>
      <button class="btn btn-secondary" onclick="document.getElementById('end-screen').style.display='none';document.getElementById('title-screen').style.display='flex';showLeaderboard()">🏆 Leaderboard</button>
    </div>
  `;
}

// === LEADERBOARD ===

function saveToLeaderboard() {
  const lb = JSON.parse(localStorage.getItem('st_leaderboard') || '[]');
  lb.push({
    name: G.companyName,
    score: G.score,
    month: G.month,
    stage: G.stage,
    sector: G.sector,
    date: new Date().toISOString().split('T')[0],
    valuation: estimateValuation(),
    exitType: G.exitType
  });
  lb.sort((a,b) => b.score - a.score);
  localStorage.setItem('st_leaderboard', JSON.stringify(lb.slice(0, 20)));
}

function showLeaderboard() {
  const lb = JSON.parse(localStorage.getItem('st_leaderboard') || '[]');
  const el = document.getElementById('lb-list');
  if (!el) return;

  if (lb.length === 0) {
    el.innerHTML = '<p style="color:var(--text2);padding:20px">Zatím žádné runs. Jdi hrát!</p>';
  } else {
    el.innerHTML = lb.map((entry, i) => `
      <div class="lb-entry">
        <div class="rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">#${i+1}</div>
        <div class="details">
          <div style="font-weight:600">${entry.name}</div>
          <div style="font-size:.8rem;color:var(--text2)">${entry.sector} • ${entry.month} měsíců • ${entry.stage} • ${entry.date}</div>
        </div>
        <div class="score">${formatNum(entry.score)}</div>
      </div>
    `).join('');
  }

  document.getElementById('title-leaderboard').classList.remove('hidden');
}

// === UTILITIES ===

function formatMoney(n) {
  if (Math.abs(n) >= 1000000000) return (n/1000000000).toFixed(1) + ' mld';
  if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(0) + 'k';
  return n + ' CZK';
}

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return String(n);
}

function clampStats() {
  G.reputation = Math.max(0, Math.min(100, G.reputation));
  G.morale = Math.max(0, Math.min(100, G.morale));
  G.quality = Math.max(0, Math.min(100, G.quality));
  G.stress = Math.max(0, Math.min(100, G.stress));
  G.marketFit = Math.max(0, Math.min(100, G.marketFit));
  G.users = Math.max(0, G.users);
  G.customers = Math.max(0, G.customers);
  G.revenue = Math.max(0, G.revenue);
}

function closeOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

let notifTimeout;
function notify(msg, type='info') {
  const el = document.getElementById('notif');
  el.className = `notif ${type}`;
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(notifTimeout);
  notifTimeout = setTimeout(() => el.classList.add('hidden'), 3000);
}

function spawnConfetti() {
  const colors = ['#6c5ce7','#00b894','#fdcb6e','#e17055','#74b9ff','#a29bfe','#ff7675','#55efc4'];
  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random()*colors.length)];
    piece.style.animationDelay = Math.random() * 2 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 5000);
  }
}

// === INIT ===
// Check for unicorn during game
const _origAdvance = advanceMonth;
advanceMonth = function() {
  _origAdvance();
  const val = estimateValuation();
  if (val >= 1000000000 && G.stage === 'scale') {
    endGame('unicorn');
  }
};
