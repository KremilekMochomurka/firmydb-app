<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Empire 🚀</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--panel:#12121a;--border:#1e1e2e;--text:#e0e0e0;--dim:#666;--cyan:#00e5ff;--mag:#ff00e5;--green:#00ff88;--red:#ff4455;--yellow:#ffcc00;--orange:#ff8800}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;min-height:100vh}
.hidden{display:none!important}
button{background:var(--panel);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
button:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-1px)}
button:active{transform:translateY(0)}
button.primary{background:linear-gradient(135deg,#00e5ff22,#ff00e522);border-color:var(--cyan)}
button.danger{border-color:var(--red);color:var(--red)}
button.danger:hover{background:var(--red);color:#fff}
button:disabled{opacity:.4;cursor:not-allowed;transform:none}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--mag));opacity:.5}
.panel h3{font-size:14px;color:var(--cyan);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.glow{text-shadow:0 0 10px currentColor}

/* Title Screen */
#title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;animation:fadeIn .8s}
#title-screen h1{font-size:4em;background:linear-gradient(135deg,var(--cyan),var(--mag));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
#title-screen .subtitle{color:var(--dim);font-size:1.1em;margin-bottom:40px}
.menu-btn{display:block;width:280px;padding:14px;margin:8px auto;font-size:16px;border-radius:8px}
.difficulty-select{display:flex;gap:10px;margin:20px 0;justify-content:center}
.diff-btn{padding:12px 24px;border-radius:8px;font-weight:600}
.diff-btn.selected{border-color:var(--cyan);background:var(--cyan);color:var(--bg)}

/* Game Layout */
#game-screen{display:none;height:100vh;grid-template-columns:280px 1fr 300px;grid-template-rows:50px 1fr 180px;gap:8px;padding:8px}
#game-screen.active{display:grid}
.top-bar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--panel);border-radius:8px;border:1px solid var(--border)}
.top-bar .stats{display:flex;gap:24px;font-size:13px}
.top-bar .stat{display:flex;align-items:center;gap:6px}
.top-bar .stat .label{color:var(--dim)}
.top-bar .stat .value{font-weight:700}
.money .value{color:var(--green)}
.valuation .value{color:var(--cyan)}
.reputation .value{color:var(--yellow)}
.turn-info{font-size:13px;color:var(--dim)}
.turn-info span{color:var(--cyan);font-weight:700}

/* Left Panel */
.left-panel{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.emp-card{background:#1a1a2e;border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;font-size:12px;transition:all .2s}
.emp-card:hover{border-color:var(--cyan)}
.emp-card .name{font-weight:700;color:var(--cyan);margin-bottom:4px}
.emp-card .role{color:var(--mag);font-size:11px;text-transform:uppercase}
.emp-card .stats-row{display:flex;gap:8px;margin-top:4px;color:var(--dim);font-size:11px}
.emp-card .salary{color:var(--red);font-size:11px;margin-top:2px}
.fire-btn{float:right;font-size:10px;padding:2px 8px;color:var(--red);border-color:var(--red)}

/* Center Panel */
.center-panel{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.tab-bar{display:flex;gap:4px;margin-bottom:8px}
.tab-btn{padding:8px 16px;border-radius:6px 6px 0 0;font-size:12px;border-bottom:none}
.tab-btn.active{background:var(--panel);border-color:var(--cyan);color:var(--cyan)}
.tab-content{display:none}
.tab-content.active{display:block}

/* Products */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.product-card{background:#1a1a2e;border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .2s}
.product-card:hover{border-color:var(--mag);transform:translateY(-2px)}
.product-card.locked{opacity:.4;cursor:not-allowed}
.product-card .pname{font-weight:700;margin-bottom:4px}
.product-card .ptype{color:var(--mag);font-size:11px;text-transform:uppercase}
.product-card .pdesc{color:var(--dim);font-size:11px;margin:6px 0}
.product-card .pcost{color:var(--red);font-size:12px}
.product-card .preview{color:var(--green);font-size:11px}
.progress-bar{height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-top:6px}
.progress-bar .fill{height:100%;border-radius:3px;transition:width .3s;background:linear-gradient(90deg,var(--cyan),var(--mag))}

/* Research */
.research-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.research-node{background:#1a1a2e;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;transition:all .3s}
.research-node:hover{border-color:var(--cyan)}
.research-node.unlocked{border-color:var(--green);background:#00ff8808}
.research-node.available{border-color:var(--cyan);cursor:pointer}
.research-node.locked{opacity:.35}
.research-node .ricon{font-size:28px;margin-bottom:6px}
.research-node .rname{font-weight:700;font-size:13px;margin-bottom:4px}
.research-node .rdesc{color:var(--dim);font-size:11px;margin-bottom:6px}
.research-node .rcost{color:var(--yellow);font-size:12px}

/* Hire */
.hire-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.hire-card{background:#1a1a2e;border:1px solid var(--border);border-radius:8px;padding:12px;transition:all .2s}
.hire-card:hover{border-color:var(--green)}
.hire-card .hname{font-weight:700;color:var(--cyan)}
.hire-card .hrole{color:var(--mag);font-size:11px;text-transform:uppercase;margin-bottom:6px}
.hire-card .hstats{color:var(--dim);font-size:11px}
.hire-card .hcost{color:var(--red);font-size:12px;margin-top:4px}
.hire-card button{margin-top:8px;width:100%}

/* Active Products */
.active-product{background:#1a1a2e;border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.active-product .ap-name{font-weight:700;color:var(--mag)}
.active-product .ap-revenue{color:var(--green);font-size:13px}
.active-product .ap-quality{color:var(--dim);font-size:12px}

/* Right Panel */
.right-panel{display:flex;flex-direction:column;gap:8px;overflow-y:auto}

/* Event Log */
.event-log{max-height:200px;overflow-y:auto;font-size:12px}
.event-log .entry{padding:6px 8px;border-left:2px solid var(--border);margin-bottom:4px;color:var(--dim);animation:slideIn .3s}
.event-log .entry.good{border-color:var(--green);color:var(--green)}
.event-log .entry.bad{border-color:var(--red);color:var(--red)}
.event-log .entry.info{border-color:var(--cyan);color:var(--cyan)}
.event-log .entry.warn{border-color:var(--yellow);color:var(--yellow)}

/* Competitors */
.competitor{background:#1a1a2e;border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;font-size:12px}
.competitor .cname{font-weight:700;color:var(--orange)}
.competitor .cval{color:var(--dim);font-size:11px}

/* Bottom Panel */
.bottom-panel{grid-column:1/-1;display:flex;gap:8px}
.chart-container{flex:1}
.chart-container canvas{width:100%;height:100%;border-radius:8px}

/* Milestones */
.milestone{display:inline-block;background:#1a1a2e;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;margin:2px;color:var(--dim)}
.milestone.achieved{border-color:var(--yellow);color:var(--yellow)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .2s}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{color:var(--cyan);margin-bottom:16px;font-size:18px}
.modal p{color:var(--dim);font-size:13px;margin-bottom:12px;line-height:1.5}
.modal .choices{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.modal .choices button{text-align:left;padding:12px;font-size:13px}

/* End Screen */
#end-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center}
#end-screen.active{display:flex}
#end-screen h1{font-size:3em;margin-bottom:10px}
#end-screen .end-stats{color:var(--dim);margin:20px 0}

/* Notification */
.notification{position:fixed;top:60px;right:20px;background:var(--panel);border:1px solid var(--cyan);border-radius:8px;padding:12px 20px;z-index:200;animation:slideIn .3s;font-size:13px}
.notification.bad{border-color:var(--red)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#333}

/* Turn button */
.next-turn-btn{padding:10px 24px;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--cyan),var(--mag));color:var(--bg);border:none;border-radius:8px;cursor:pointer;transition:all .2s}
.next-turn-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(0,229,255,.3)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Tooltip */
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#000;color:var(--text);padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;z-index:50}
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <h1>STARTUP EMPIRE</h1>
  <p class="subtitle">Ze Zlína na vrchol světa 🚀</p>

      <button onclick="saveGame()" style="font-size:11px">💾</button>

  </div>

  <!-- LEFT: Team -->
  <div class="left-panel">
    <div class="panel" style="flex:1;overflow-y:auto">
      <h3>👥 Team (<span id="team-count">0</span>)</h3>
      <div id="team-list"></div>
    </div>
    <div class="panel">
      <h3>🏆 Milestones</h3>
      <div id="milestones"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center-panel">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('products')">📦 Products</button>
      <button class="tab-btn" onclick="switchTab('hire')">🧑‍💼 Hire</button>
      <button class="tab-btn" onclick="switchTab('research')">🔬 Research</button>
      <button class="tab-btn" onclick="switchTab('active')">📊 Portfolio</button>
      <button class="tab-btn" onclick="switchTab('market')">🌍 Market</button>
    </div>
    <div class="panel" style="flex:1;overflow-y:auto">
      <div id="tab-products" class="tab-content active"></div>
      <div id="tab-hire" class="tab-content"></div>
      <div id="tab-research" class="tab-content"></div>
      <div id="tab-active" class="tab-content"></div>
      <div id="tab-market" class="tab-content"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="panel">
      <h3>🤖 Competitors</h3>
      <div id="competitors"></div>
    </div>
    <div class="panel" style="flex:1;overflow-y:auto">

</div>

<!-- END SCREEN -->
<div id="end-screen">
  <h1 id="end-title"></h1>
  <p id="end-subtitle" style="color:var(--dim);font-size:1.2em"></p>
  <div class="end-stats" id="end-stats"></div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="event.target===this&&closeModal()">
  <div class="modal" id="modal"></div>

// ===== AUDIO ENGINE =====
const Audio = {
  ctx: null,
  init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  },
  play(type) {
    if (!this.ctx) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.connect(g); g.connect(this.ctx.destination);
    g.gain.value = 0.08;
    const t = this.ctx.currentTime;
    switch(type) {
      case 'click': o.frequency.value=800; o.type='sine'; g.gain.exponentialRampToValueAtTime(.001,t+.1); o.start(t); o.stop(t+.1); break;
      case 'success': o.frequency.value=523; o.type='sine'; g.gain.exponentialRampToValueAtTime(.001,t+.3); o.start(t); o.stop(t+.3);
        const o2=this.ctx.createOscillator(),g2=this.ctx.createGain();o2.connect(g2);g2.connect(this.ctx.destination);g2.gain.value=.08;o2.frequency.value=659;o2.type='sine';g2.gain.exponentialRampToValueAtTime(.001,t+.4);o2.start(t+.15);o2.stop(t+.4); break;
      case 'error': o.frequency.value=200; o.type='sawtooth'; g.gain.value=.05; g.gain.exponentialRampToValueAtTime(.001,t+.3); o.start(t); o.stop(t+.3); break;
      case 'alert': o.frequency.value=440; o.type='triangle'; g.gain.exponentialRampToValueAtTime(.001,t+.5); o.start(t); o.stop(t+.5); break;
      case 'coin': o.frequency.value=1200; o.type='sine'; g.gain.exponentialRampToValueAtTime(.001,t+.15); o.start(t); o.stop(t+.15); break;
      case 'levelup': o.frequency.value=400; o.type='sine'; o.frequency.exponentialRampToValueAtTime(1200,t+.3); g.gain.exponentialRampToValueAtTime(.001,t+.4); o.start(t); o.stop(t+.4); break;
    }
  }
};
document.addEventListener('click', () => Audio.init(), {once:true});

// ===== UTILITY =====
function fmt(n) {
  if (Math.abs(n)>=1e9) return (n/1e9).toFixed(1)+'B';
  if (Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+'M';
  if (Math.abs(n)>=1e3) return (n/1e3).toFixed(0)+'K';
  return Math.floor(n).toLocaleString('cs-CZ');
}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1))}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

function playSound(type) {
  if (G.settings && G.settings.soundOn) Audio.play(type);
}

function renderCharts() {
  // Finance chart
  const fc = document.getElementById('finance-chart');
  const fctx = fc.getContext('2d');
  const w = fc.parentElement.clientWidth - 32;
  const h = fc.parentElement.clientHeight - 40;
  fc.width = w; fc.height = h;
  fctx.clearRect(0,0,w,h);
  
  if (G.history.cash.length > 1) {
    drawLine(fctx, G.history.cash, w, h, '#00ff88', 'Cash');
    drawLine(fctx, G.history.revenue, w, h, '#00e5ff', 'Revenue');
  }

  // Valuation chart
  const vc = document.getElementById('val-chart');
  const vctx = vc.getContext('2d');
  vc.width = w; vc.height = h;
  vctx.clearRect(0,0,w,h);
  if (G.history.valuation.length > 1) {
    drawLine(vctx, G.history.valuation, w, h, '#ff00e5', 'Valuation');
  }
}

function drawLine(ctx, data, w, h, color, label) {
  const max = Math.max(...data, 1);
  const min = Math.min(...data, 0);
  const range = max - min || 1;
  const step = w / Math.max(data.length - 1, 1);
  
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / range) * (h - 20) - 10;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // Label
  ctx.fillStyle = color;
  ctx.font = '11px sans-serif';
  ctx.fillText(label + ': ' + fmt(data[data.length-1]), 5, 15);
  
  // Glow
  ctx.strokeStyle = color + '33';
  ctx.lineWidth = 6;
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / range) * (h - 20) - 10;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}

// ===== TABS =====
function switchTab(tab) {
  playSound('click');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

// ===== GAME ACTIONS =====
function generateHires() {
  const count = G.hireBonusNextTurn ? 6 : 4;
  const skillBonus = G.hireBonusNextTurn ? 15 : 0;
  G.hireBonusNextTurn = false;
  G.availableHires = [];
  for (let i=0; i<count; i++) {
    const type = pick(EMPLOYEE_TYPES);
    const repBonus = Math.floor(G.reputation / 10);
    const skill = clamp(rnd(30, 70) + repBonus + skillBonus, 20, 99);
    const salary = Math.floor(type.salaryRange[0] + (skill/100) * (type.salaryRange[1]-type.salaryRange[0]));
    G.availableHires.push({
      name: pick(CZECH_FIRST) + ' ' + pick(CZECH_LAST),
      role: type.role, icon: type.icon, color: type.color,
      skill, salary, morale: 80
    });
  }
}

function hireEmployee(idx) {
  const h = G.availableHires[idx];
  if (!h || G.cash < h.salary * 3) return;
  playSound('success');
  G.cash -= h.salary * 3;
  G.employees.push({...h});
  G.availableHires.splice(idx, 1);
  addLog('Hired ' + h.name + ' as ' + h.role, 'good');
  render();
}

function fireEmployee(idx) {
  const e = G.employees[idx];
  if (!e) return;
  playSound('click');
  G.employees.splice(idx, 1);
  G.reputation -= 3;
  addLog('Fired ' + e.name, 'bad');
  render();
}

function startProduct(id) {
  const type = PRODUCT_TYPES.find(p=>p.id===id);
  if (!type || G.cash < type.baseCost) return;
  
  const locked = type.requires.length > 0 && !type.requires.every(r => G.unlockedResearch.includes(r));
  if (locked) return;
  
  playSound('coin');
  G.cash -= type.baseCost;
  let devTime = type.devTime;
  if (G.unlockedResearch.includes('agile')) devTime = Math.max(1, Math.ceil(devTime * 0.8));
  
  G.developingProducts.push({type, turnsLeft: devTime, totalTurns: devTime});
  addLog('Started developing ' + type.name, 'info');
  render();
}

function startResearch(id) {
  const r = RESEARCH_TREE.find(n=>n.id===id);
  if (!r || G.cash < r.cost || G.researchInProgress) return;
  if (!r.requires.every(req=>G.unlockedResearch.includes(req))) return;
  
  playSound('click');
  G.cash -= r.cost;
  G.researchInProgress = {id: r.id, turnsLeft: r.turns};
  addLog('Started researching ' + r.name, 'info');
  render();
}

function upgradeProduct(idx) {
  const p = G.activeProducts[idx];
  if (!p || G.cash < 50000) return;
  playSound('coin');
  G.cash -= 50000;
  p.quality = Math.min(100, p.quality + rnd(5, 15));
  p.revenue *= 1.1;
  addLog('Upgraded ' + p.type.name, 'good');
  render();
}

function shutdownProduct(idx) {
  const p = G.activeProducts[idx];
  if (!p) return;
  playSound('click');
  G.activeProducts.splice(idx, 1);
  addLog('Shut down ' + p.type.name, 'warn');
  render();
}

function expandMarket(idx) {
  const costs = [0, 200000, 500000, 1000000, 2000000, 5000000];
  const reqs = [0, 30, 50, 65, 80, 90];
  if (G.marketExpansion >= idx || G.marketExpansion < idx-1) return;
  if (G.cash < costs[idx] || G.reputation < reqs[idx]) return;
  
  playSound('levelup');
  G.cash -= costs[idx];
  G.marketExpansion = idx;
  const multiplier = 1 + idx * 0.3;
  G.activeProducts.forEach(p => p.revenue *= 1.3);
  addLog('Expanded to new market! Revenue x1.3', 'good');
  render();
}

// ===== TURN LOGIC =====
function nextTurn() {
  playSound('click');
  
  // 1. Pay salaries
  const burn = G.employees.reduce((s,e)=>s+e.salary, 0);
  G.cash -= burn;
  
  // 2. Collect revenue
  const rev = G.activeProducts.reduce((s,p)=>s+p.revenue, 0);
  G.cash += rev;
  G.totalRevenue += rev;
  
  // 3. Progress developing products
  G.developingProducts.forEach(p => p.turnsLeft--);
  const finished = G.developingProducts.filter(p => p.turnsLeft <= 0);
  G.developingProducts = G.developingProducts.filter(p => p.turnsLeft > 0);
  
  finished.forEach(p => {
    const devSkill = G.employees.filter(e=>e.role==='Developer').reduce((s,e)=>s+e.skill,0);
    const designSkill = G.employees.filter(e=>e.role==='Designer').reduce((s,e)=>s+e.skill,0);
    let quality = clamp(40 + devSkill/5 + designSkill/8 + rnd(-10,10), 20, 100);
    if (G.unlockedResearch.includes('data_pipeline')) quality = Math.min(100, quality * 1.2);
    
    let revenue = p.type.baseRevenue * (quality/60) * (0.5 + Math.random() * p.type.riskMod);
    const marketingSkill = G.employees.filter(e=>e.role==='Marketer').reduce((s,e)=>s+e.skill,0);
    if (G.unlockedResearch.includes('growth_hacking')) revenue *= 1.3;
    revenue *= (1 + marketingSkill/200);
    if (G.unlockedResearch.includes('llm_fine_tuning') && p.type.category==='AI') revenue *= 1.5;
    
    const salesSkill = G.employees.filter(e=>e.role==='Salesperson').reduce((s,e)=>s+e.skill,0);
    revenue *= (1 + salesSkill/300);
    
    // Market multiplier
    revenue *= (1 + G.marketExpansion * 0.25);
    
    G.activeProducts.push({
      type: p.type, quality, revenue: Math.floor(revenue),
      users: Math.floor(revenue / 2 * (1 + Math.random()))
    });
    playSound('levelup');
    addLog('🚀 Launched ' + p.type.name + '! Revenue: ' + fmt(revenue) + '/mo', 'good');
  });
  
  // 4. Research progress
  if (G.researchInProgress) {
    G.researchInProgress.turnsLeft--;
    if (G.researchInProgress.turnsLeft <= 0) {
      const r = RESEARCH_TREE.find(n=>n.id===G.researchInProgress.id);
      G.unlockedResearch.push(G.researchInProgress.id);
      G.researchInProgress = null;
      playSound('levelup');
      addLog('🔬 Unlocked: ' + r.name + '!', 'good');
      // Apply bonuses
      if (r.id === 'cybersec_advanced') G.reputation += 20;
    }
  }
  
  // 5. Product decay & growth
  G.activeProducts.forEach(p => {
    p.quality = Math.max(10, p.quality - rnd(1,3));
    p.revenue *= (0.97 + p.quality/1000);
    p.users = Math.floor(p.users * (0.95 + p.quality/500 + Math.random()*0.1));
    if (p.quality < 20) p.revenue *= 0.8;
  });
  
  // 6. Temp employees
  G.employees = G.employees.filter(e => {
    if (e.temporary) {
      e.temporary--;
      if (e.temporary <= 0) { addLog(e.name+' (intern) left', 'info'); return false; }
    }
    return true;
  });
  
  // 7. Competitor AI
  G.competitors.forEach(c => {
    if (!c.alive) return;
    c.valuation *= (0.95 + Math.random() * 0.15);
    if (Math.random() < 0.3) c.products += 1;
    if (c.style === 'aggressive') c.valuation *= 1.05;
    if (c.valuation < 100000) { c.alive = false; addLog('💀 ' + c.name + ' went bankrupt!', 'warn'); }
  });
  
  // 8. Random event (70% chance)
  if (Math.random() < 0.7) {
    const eligible = EVENTS.filter(e => !e.cond || e.cond(G));
    if (eligible.length) {
      const ev = pick(eligible);
      if (ev.type === 'choice') {
        showEventModal(ev);
      } else {
        const result = ev.effect(G);
        addLog(`${ev.type==='good'?'✅':'❌'} ${ev.name}: ${result}`, ev.type==='good'?'good':'bad');
        if (ev.type === 'good') playSound('success');
        else playSound('error');
      }
    }
  }
  
  // 9. Update valuation
  const revMultiplier = G.activeProducts.reduce((s,p)=>s+p.revenue,0) * 12 * 5;
  const teamValue = G.employees.length * 200000;
  const repMultiplier = 1 + G.reputation / 100;
  const researchValue = G.unlockedResearch.length * 500000;
  G.valuation = Math.max(G.valuation * 0.9, (G.cash + revMultiplier + teamValue + researchValue) * repMultiplier);
  
  // 10. Check milestones
  MILESTONES.forEach(m => {
    if (!G.achievedMilestones.includes(m.id) && m.check(G)) {
      G.achievedMilestones.push(m.id);
      m.bonus(G);
      playSound('levelup');
      addLog('🏆 Milestone: ' + m.name + '!', 'good');
      notify('🏆 ' + m.name + ' achieved!');
    }
  });
  
  // 11. History
  G.history.cash.push(G.cash);
  G.history.valuation.push(G.valuation);
  G.history.revenue.push(G.activeProducts.reduce((s,p)=>s+p.revenue,0));
  
  // 12. Generate new hires
  generateHires();
  
  // 13. Advance turn
  G.turn++;
  
  // 14. Check endings
  checkEndings();
  
  render();
}

function checkEndings() {
  if (G.ending === 'acquisition') {
    showEnding('Acquired! 🤝', 
      'Prodal jsi firmu za ' + fmt(G.valuation) + ' CZK. Zlatý padák secured.',
      'acqui-hire');
    return;
  }
  if (G.cash < -500000) {
    showEnding('Bankrot! 💀', 
      'Došly prachy. Zlín sends its regards.',
      'bankruptcy');
    return;
  }
  if (G.valuation >= 1000000000) {
    showEnding('UNICORN! 🦄', 
      'Valuace přes miliardu! Ze Zlína na vrchol světa. IPO time!',
      'ipo');
    return;
  }
  if (G.turn > 60) {
    if (G.valuation >= 100000000) {
      showEnding('Tech Mogul 👑', 'Po 5 letech máš firmu za ' + fmt(G.valuation) + ' CZK. Respekt.', 'mogul');
    } else if (G.valuation >= 10000000) {
      showEnding('Solid Business 📊', 'Stabilní byznys za ' + fmt(G.valuation) + '. Not bad, kid.', 'solid');
    } else {
      showEnding('Lifestyle Business 🏖️', 'Malá firmička, ale vlastní. Aspoň máš klid.', 'lifestyle');
    }
  }
}

function showEnding(title, subtitle, type) {
  document.getElementById('game-screen').classList.remove('active');
  document.getElementById('game-screen').style.display = 'none';
  const es = document.getElementById('end-screen');
  es.classList.add('active');
  es.style.display = 'flex';
  
  const colors = {ipo:'var(--cyan)',bankruptcy:'var(--red)',mogul:'var(--yellow)',acquisition:'var(--green)',solid:'var(--mag)',lifestyle:'var(--dim)'};
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-title').style.color = colors[type]||'var(--cyan)';
  document.getElementById('end-subtitle').textContent = subtitle;
  document.getElementById('end-stats').innerHTML = `
    <p>Turns: ${G.turn} | Final Cash: ${fmt(G.cash)} CZK</p>
    <p>Final Valuation: ${fmt(G.valuation)} CZK</p>
    <p>Products: ${G.activeProducts.length} | Team: ${G.employees.length}</p>
    <p>Research: ${G.unlockedResearch.length}/${RESEARCH_TREE.length}</p>
    <p>Milestones: ${G.achievedMilestones.length}/${MILESTONES.length}</p>
    <p>Markets: ${G.marketExpansion+1} | Equity Given: ${G.equityGiven}%</p>
    <p>Difficulty: ${G.difficulty}</p>
  `;
  
  localStorage.removeItem('startup_empire_save');
}

// ===== MODAL =====
function showEventModal(ev) {
  const modal = document.getElementById('modal');
  modal.innerHTML = `<h2>${ev.name}</h2><p>${ev.desc}</p>
    <div class="choices">${ev.choices.map((c,i) => 
      `<button onclick="resolveEvent(${EVENTS.indexOf(ev)},${i})">${c.text}</button>`
    ).join('')}</div>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function resolveEvent(evIdx, choiceIdx) {
  const ev = EVENTS[evIdx];
  const choice = ev.choices[choiceIdx];
  const result = choice.effect(G);
  addLog(`${ev.name}: ${result||'Done'}`, 'info');
  closeModal();
  
  if (G.ending) checkEndings();
  render();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}

function showSettings() {
  const modal = document.getElementById('modal');
  modal.innerHTML = `<h2>⚙️ Settings</h2>
    <div style="margin:12px 0">
      <button onclick="G.settings.soundOn=!G.settings.soundOn;showSettings()">${G.settings.soundOn?'🔊 Sound ON':'🔇 Sound OFF'}</button>
    </div>
    <div style="margin:12px 0">
      <button onclick="saveGame();closeModal()">💾 Save Game</button>
      <button class="danger" onclick="if(confirm('Really?')){localStorage.removeItem('startup_empire_save');location.reload()}" style="margin-left:8px">🗑️ Delete Save</button>
    </div>
    <button onclick="closeModal()">Close</button>`;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

// ===== LOG & NOTIFICATIONS =====
function addLog(text, type='info') {
  G.eventLog.push({turn: G.turn, text, type});
}

function notify(text, bad=false) {
  const n = document.createElement('div');
  n.className = 'notification' + (bad?' bad':'');
  n.textContent = text;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(), 3000);
}

// ===== SAVE/LOAD =====
function saveGame() {
  localStorage.setItem('startup_empire_save', JSON.stringify(G));
  playSound('success');
  notify('💾 Game saved!');
}

function loadGame() {
  const data = localStorage.getItem('startup_empire_save');
  if (!data) return;
  G = JSON.parse(data);
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('game-screen').style.display = 'grid';
  render();
}

// ===== INIT =====
function startNewGame() {
  playSound('success');
  const diff = document.querySelector('.diff-btn.selected')?.dataset.diff || 'normal';
  G = defaultState(diff);
  generateHires();
  G.history.cash.push(G.cash);
  G.history.valuation.push(G.valuation);
  G.history.revenue.push(0);
  
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').classList.add('active');
  document.getElementById('game-screen').style.display = 'grid';
  
  addLog('🚀 Startup Empire začíná! Máš '+fmt(G.cash)+' CZK a velký sen.', 'good');
  render();
}

// Difficulty selection
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    Audio.init();
    playSound('click');
  });
});

// Check for save
if (localStorage.getItem('startup_empire_save')) {
  document.getElementById('load-btn').style.display = 'block';
}
</script>
