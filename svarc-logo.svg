<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2a5a8c"/>
    </linearGradient>
  </defs>
  <!-- Dump truck silhouette -->
  <g transform="translate(10, 18)">
    <!-- Truck bed (tilted dump body) -->
    <polygon points="28,52 30,22 75,18 78,52" fill="#e87722"/>
    <polygon points="75,18 78,52 82,52 80,20" fill="#c96618"/>
    <!-- Cabin -->
    <rect x="78" y="30" width="28" height="22" rx="3" fill="#1a3a5c"/>
    <rect x="82" y="33" width="10" height="10" rx="1" fill="#a8c8e8" opacity="0.7"/>
    <!-- Chassis -->
    <rect x="25" y="52" width="84" height="6" rx="2" fill="#1a3a5c"/>
    <!-- Wheels -->
    <circle cx="42" cy="62" r="8" fill="#333"/>
    <circle cx="42" cy="62" r="4" fill="#666"/>
    <circle cx="95" cy="62" r="8" fill="#333"/>
    <circle cx="95" cy="62" r="4" fill="#666"/>
    <!-- Exhaust pipe -->
    <rect x="106" y="25" width="3" height="16" rx="1" fill="#555"/>
  </g>
  <!-- Text: Služby ŠVARC -->
  <text x="135" y="58" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="36" fill="#1a3a5c" letter-spacing="1">Služby ŠVARC</text>
  <!-- Text: s.r.o. -->
  <text x="135" y="80" font-family="Arial, sans-serif" font-weight="400" font-size="16" fill="#e87722" letter-spacing="2">s.r.o.</text>
  <!-- Accent line -->
  <rect x="135" y="86" width="240" height="3" rx="1.5" fill="#e87722"/>
  <!-- Tagline -->
  <text x="135" y="105" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#7a8a9a" letter-spacing="1.5">PŘEPRAVA · LOGISTIKA · STAVEBNICTVÍ</text>
</svg>